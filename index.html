<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерьер. — Магазин мебели</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header">
        <div class="container">
            <img src="img/logo.png" alt="Интерьер." class="main-logo">
        </div>
    </header>

    <section class="hero" style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('img/hero-bg.jpg');">
        <div class="hero-content">
            <h1>Современная мебель</h1>
            <p>Уют в каждой детали</p>
        </div>
    </section>

    <main class="container">
        <h2 class="section-title">Наши товары</h2>
        
        <div class="products-grid">
            <div class="product-card">
                <img src="img/bed.jpg" alt="Кровать">
                <div class="product-info">
                    <h3>Кровать TATRAN</h3>
                    <p class="product-price">45 000 ₽</p>
                </div>
            </div>

            <div class="product-card">
                <img src="img/chair1.jpg" alt="Кресло">
                <div class="product-info">
                    <h3>Кресло VILORA</h3>
                    <p class="product-price">18 500 ₽</p>
                </div>
            </div>

            <div class="product-card">
                <img src="img/chair2.jpg" alt="Кресло">
                <div class="product-info">
                    <h3>Кресло ASKESTA</h3>
                    <p class="product-price">14 900 ₽</p>
                </div>
            </div>

            <div class="product-card">
                <img src="img/table.jpg" alt="Стол">
                <div class="product-info">
                    <h3>Стол MENU</h3>
                    <p class="product-price">22 000 ₽</p>
                </div>
            </div>

            <div class="product-card">
                <img src="img/sofa1.jpg" alt="Столик">
                <div class="product-info">
                    <h3>Стол NORMAN</h3>
                    <p class="product-price">9 800 ₽</p>
                </div>
            </div>

            <div class="product-card">
                <img src="img/sofa2.jpg" alt="Диван">
                <div class="product-info">
                    <h3>Диван NASTAN</h3>
                    <p class="product-price">62 000 ₽</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
